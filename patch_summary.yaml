modified_files:
  - path: source_modified/function_SPH_DEM_COUPLING.cuh
    changes:
      - Added SOPHIA_SPH_DEM_HEAT_ENABLE compile-time option.
      - Added grid-free DEM solid heat conduction using SPH interpolation over neighboring DEM particles.
      - Added local solid volume fraction estimate from DEM particle volumes and SPH kernel weights.
      - Added effective conductivity function sophia_case311_ks_eff_from_solid_fraction(alpha_s).
      - Combined new solid-solid SPH conduction dT/dt with the paper-aligned SPH gas/fluid convective heat-transfer dT/dt.
      - Replaced the copied code's Ranz-Marshall-style `Nu = 2 + 0.6 Re^0.5 Pr^(1/3)` with Imatani & Sakai Eq. (29), the Gunn packed/fluidized-bed correlation.
      - Replaced hard-coded/solid-conductivity convection coefficients with Eq. (30) `Pr = Cpf mu_f/k_f` and Eq. (31) `h_fs = Nu_fs k_f/d_p`, `Q_fs = h_fs (6/d_p)(T_f-T_s)`.
      - Stored diagnostic values in P1_dem[i].test1 and P1_dem[i].test2.
  - path: source_modified/function_OUTPUT.cuh
    changes:
      - Added VTK output field sph_solid_volume_fraction from P1.test1.
      - Added VTK output field sph_ks_eff from P1.test2.
      - Fixed VTK POINTS count to match the actual DEM particles written (`p_type > 1000`).
      - Fixed legacy VTK FIELD metadata count to 12 arrays so ParaView can display particle fields instead of only Solid Color.
      - Added newline separators after binary VTK arrays for safer legacy VTK parsing.
  - path: source_modified/ISPH.cuh
    changes:
      - Patched hard-coded computational domain to cover Case 3-1-1 fixed bed, 200 mm x 40 mm x 40 mm.
  - path: source_modified/Parameters.cuh
    changes:
      - Set gas density and inlet constants to Case 3-1-1/Table 1 values.
  - path: source_modified/function_init.cuh
    changes:
      - "Restored original one-particle-per-line counting semantics in `gpu_count_particle_numbers2`: `particles = input line count - 1 header line`."
      - Added a diagnostic print showing input line count and particle count.
  - path: source_modified/function_PROP.cuh
    changes:
      - Set solid conductivity to 1.4 W/(m K).
      - Set gas conductivity to 0.025 W/(m K).
      - Set solid specific heat to 840 J/(kg K).
      - Set gas specific heat to 1010 J/(kg K).
  - path: case_generator/generate_case311_sph_heat.py
    changes:
      - Generates full Case 3-1-1 DEM primitive-cubic fixed bed plus gas SPH carrier particles.
      - Sets plot-output frequency to 100 steps so VTK output is written every 0.01 s for dt=1.0e-4 s.
      - Calls the input-particle plotting script after generation so geometry images are always saved.
  - path: case_generator/plot_input_particles.py
    changes:
      - Creates 2D projection and 3D sampled visual checks of generated `input.txt` particle locations.
      - Writes plot images and a compact coordinate-range summary under `validation/input_plots/`.
  - path: case_generator/validate_case311.py
    changes:
      - Validates label layout, particle counts, DEM radius, gas p_type, and finite values.
verification:
  input_generation: passed
  input_sanity: passed
  solid_fluid_heat_transfer_equations:
    paper_equations: Imatani_Sakai_2025_Eq_29_to_31
    nusselt_correlation: Gunn_packed_fluidized_bed
    old_ranz_marshall_terms_removed_from_source_modified_cuh: true
    h_conv_uses_fluid_conductivity_not_solid_conductivity: true
  input_regeneration_after_heat_transfer_patch: passed
  parser_particle_count_fix: passed
  parser_particle_count_probe:
    input_format: one_particle_per_tab_separated_line
    total_lines_including_header: 360001
    data_lines: 360000
    labels_per_particle: 18
    particles: 360000
  full_case_particles:
    dem: 320000
    gas_sph_carrier: 40000
    total: 360000
  vtk_output_interval:
    dt_s: 0.0001
    plot_output_frequency_steps: 100
    interval_s: 0.01
  vtk_field_metadata:
    points_count_condition: p_type_gt_1000
    field_array_count: 12
    field_arrays:
      - itype
      - mag_uijf
      - Euler
      - porosity
      - uz
      - Q_sd
      - ftotal_z
      - temperature_surface
      - rad
      - sph_solid_volume_fraction
      - sph_ks_eff
      - dtemp_dt
  nvcc_available_on_mac_mini: false
  cuda_compile_run: not_performed_because_nvcc_not_found
